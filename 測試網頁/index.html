n輪檔固定後，再行作業或停放。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 15, "q": "非作業車輛及裝備可任意停放在無停車格區。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 16, "q": "貨機坪內交通道之速限為時數40公里。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 17, "q": "行駛機坪外交通道上時，見車道管制員舉牌須立即停\n車。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 18, "q": "穿越E滑行道時，應「停車」確認無航機滑行時，才可\n通行。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 19, "q": "無線電通訊應清晰、簡潔，如獲指示必須覆誦以表達\n充分理解。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 20, "q": "車輛行駛空側區域，如發現異狀應立即通知桃園機場\n公司航務處處理。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 21, "q": "各單位申領車輛通行證之車輛應裝設黃色閃光警示\n燈、輪檔及在有效期限內之小型滅火器，車身兩側需\n貼有明顯該公司名稱標誌。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 22, "q": "車輛通行證A類證可由本機場除行李處理場崗哨外各\n崗哨進出、通行跑道、滑行道、停機坪、交通道、勤\n務道、環場道及行李處理場。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 23, "q": "各單位換領各類車輛通行證時，原領用之舊證一併繳\n回機場公司繳銷，否則新證不予發給。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 24, "q": "車輛通行證之使用務須切實遵守各類車輛通行證使用\n原則，駕駛人須持有本場空側駕駛許可，並依本場活\n動區行車管制作業規定行駛，不得違規使用。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 25, "q": "場內車輛通行證可進入跑道及滑行道的引導車\n(Follow-me)應領用車輛通行證A類證。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 26, "q": "車輛或裝備行駛時，搭載人員數量不限且可攀立。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 27, "q": "車輛裝備行駛時，應讓航空器優先通行，遇接駁車時\n則視情況而定。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 28, "q": "各類車輛通行證不得越區、逾期、冒用或塗改使用，\n如違反而經查獲者，除即行收回該車輛通行證外，並\n依相關規定處理，另通知其所屬單位查明懲處。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 29, "q": "車輛於低能見度穿越E及Q滑行道時，應遵守本場消防\n隊之管制。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 30, "q": "貨盤車載運散裝貨盤時，堆放高度不得超過1.8公尺並\n覆蓋盤網防止貨盤脫落。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 31, "q": "各作業車輛可以由任何角度進出機坪。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 32, "q": "車輛轉彎或改道行駛時，應以方向燈或手勢表示。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 33, "q": "車輛及裝備靠機作業時，不得妨礙加油車撤離之道", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 34, "q": "機場作業人員及車輛應讓航機優先通行，隨時注意航\n機進坪、後推及滑行安全，禁止由滑行中航空器前方\n強行通行，影響航機安全。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 35, "q": "遠端接駁停機坪之編號為601-615。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 36, "q": "場內施工車輛駕駛人未領有場內駕駛許可，應由請領\n單位派有與行駛區域相對應的空側駕駛資格的駕駛人\n陪同，方得於活動區行駛。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 37, "q": "執行航空器拖機作業時，於停機坪上速度不得超過每\n小時5公里。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 38, "q": "除空橋維修車輛外，空橋裝備周邊紅色區域，不得停\n放任何車輛。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 39, "q": "行車前應先行檢查車頂閃光警示燈是否正常。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 40, "q": "機坪內未停放航機時，可利用空間暫時停放地面裝備\n及盤貨。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 41, "q": "車輛因作業需要可暫停於空橋下方之紅線區。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 42, "q": "所有須進入操作區之施工車輛及機具，無須裝設可與\n塔臺通聯之無線電。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 43, "q": "所有須進入操作區之施工車輛及機具，必須裝設可與\n塔臺通聯之無線電。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 44, "q": "須進入操作區之施工車輛如未裝設與塔臺通聯之無線\n電，必須尾隨其他裝設有無線電之車輛團進團出。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 45, "q": "須進入操作區之施工車輛如未裝設與塔臺通聯之無線\n電，無須跟隨其他裝設有無線電之車輛團進團出。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 46, "q": "操作區指機場內供航空器起飛、降落及滑行之區域，\n且包括停機坪", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 47, "q": "行駛機坪外交通道，車速不得超過每小時40公里。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 48, "q": "桃園機場發佈「雷(暴)雨當空」時，仍可視當時狀況\n自行決定是否繼續執行地面作業。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 49, "q": "各作業車輛應讓航空器及接駁車優先通行並嚴禁超", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 50, "q": "行駛空側活動區行駛車輛應全天候開啟閃光警示燈，\n大燈可僅於夜晚開啟即可。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 51, "q": "拖車後方最多拖掛6輛平板車或貨盤車。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 52, "q": "陸側為泛指機場內供航空器起飛、降落及地面活動之\n區域。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 53, "q": "車輛穿越E滑行道時，應停、看確定無航空器拖(滑)行\n時，始可通過。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 54, "q": "A類車輛通行證可由所有桃園機場崗哨進出，通行範\n圍為跑道、滑行道、停機坪、交通道、勤務道、環場\n道、行李處理場。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 55, "q": "拖車行駛時，其所拖掛之貨板車或貨櫃內在下雨天時\n可以載人。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 56, "q": "雷(暴)雨當空時，停機坪作業是否停止，由航空公司\n與地面作業單位自行協調決定。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 57, "q": "需駛入操作區之車輛須於呼叫塔臺前開啟車載ADS-B\n裝備，脫離操作區後關閉之。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 58, "q": "在交通道行駛穿越滑行道時，遇見拖機作業，若無人\n管制就不必在停等標線前確實停等。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 59, "q": "行駛航廈地下室行李處理場之下坡路段，拖車頭車速\n不得超過每小時15公里；設有速限標示處應依其速", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 60, "q": "航空器關車並安置輪檔後，無須待耳機員哨音或手勢\n，各地面裝備車輛便可接近該航空器作業。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 61, "q": "各作業車輛進出停機坪須依照所劃設之標線及行進方\n向箭頭標示行進。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 62, "q": "行C、D停機坪內交通道，車速不得超過每小時25公里\n，如在作業繁忙時應視狀況減速慢行。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 63, "q": "活動區是指機場內供航空器起飛、降落及滑行之區域\n，但不包括操作區及停機坪。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 64, "q": "車輛通行證應於屆期或契約結束，工程施工完畢時，\n由業管單位負責將車輛通行證收回，送繳桃園機場公\n司航務處註銷。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 65, "q": "車輛裝備可穿越機翼或機腹下方。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 66, "q": "航空器離場後各單位之地面裝備、車輛、貨物無須停\n放於規劃之裝備停放區。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 67, "q": "執行拖機作業時; 拖機速度於機坪上速限為每小時15\n公里。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 68, "q": "作業人員執行拖機作業時; 拖桿式拖車拖機速度於滑行\n道上不得超過每小時15公里。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 69, "q": "作業人員執行拖機作業時; 無拖桿式拖車拖機速度於滑\n行道上不得超過每小時20公里。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 70, "q": "A類加上C2車輛通行證可由所有桃園機場崗哨進出，\n通行範圍為跑道、滑行道、停機坪、交通道、勤務\n道、環場道、地下行李室處理場。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 71, "q": "停機坪為在陸上機場供航空器上下旅客、裝卸郵件或\n貨物、加油、停機或維修等目的而劃設之區域。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 72, "q": "操作區指機場內供航空器起飛、降落及滑行之區域，\n但不包括停機坪。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 73, "q": "行駛空側活動區行駛車輛應全天候開啟閃光警示燈及\n大燈，同時應開啟遠光燈。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 74, "q": "行駛空側活動區行駛車輛應全天候開啟閃光警示燈及\n大燈。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 75, "q": "拖車所拖掛之貨板車上得載人行駛。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 76, "q": "空側區域發生車禍或意外事故應立即通知桃園機場公\n司桃園機場公司航務處。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 77, "q": "行駛航廈行李處理場，車速不得超過每小時20公里，\n其上坡路段，車速則不得超過每小時40里。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 78, "q": "空側為機場內供航機使用之區域或與該區域鄰接之區\n域。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 79, "q": "停機坪安全線、禁止穿越線、空橋作業區域標線之顏\n色為紅色。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 80, "q": "停機坪安全線、禁止穿越線、空橋作業區域標線之顏\n色為黃色。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 81, "q": "在夜晚或低能見度無法確定自己車輛位置時，為避免\n影響場面作業，應自行找路。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 82, "q": "在夜晚或低能見度無法確定自己車輛位置時，切勿自\n行找路，應停止移動，並立即通報桃園機場公司航務", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 83, "q": "進入操作區之車輛應具有A類車輛通行證。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 84, "q": "進入操作區之車輛應具有B類車輛通行證。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 85, "q": "施工車輛應保持整潔並覆蓋帆布，行經路徑不得有飄\n飛物、FOD、汙泥漿等其他汙染鋪面而造成飛安事故\n之情形。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 86, "q": "進入空側施工區域，不分晝夜皆須穿著反光背心。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 87, "q": "一般勤務車輛閃光警示燈顏色為黃色。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 88, "q": "消防及救護車輛閃光警示燈顏色為紅色。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 89, "q": "緊急及保安車輛閃光警示燈顏色為藍色。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 90, "q": "閃光警示燈應裝置於車頂或明顯處。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 91, "q": "進出、穿越停機坪須依照所劃設之交通道或行進方向\n箭頭標線行進。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 92, "q": "停機坪及滑行道上不得兩車並行駛或搶道。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 93, "q": "車輛與裝備停放時應拉妥手煞並以輪檔或使用液壓支\n架固定。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 94, "q": "桃園國際機場空側駕駛許可之管理單位為桃園機場總\n務處。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 95, "q": "行使航廈行李處理場之下坡路段，拖車頭須依限速指\n示牌減速至時速15公里，其餘車輛依「慢行」指示牌\n及標線減速慢行。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 96, "q": "貨機坪內交通道之速限為25公里。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 97, "q": "無線電通訊不必複誦指示，僅回答ROGER即可。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 98, "q": "車輛通行證A類證不得通行環場道。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 99, "q": "車輛裝備行駛時，應禮讓航空器及接駁車優先通行。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 100, "q": "貨盤車載運散裝貨盤時，堆放高度不得超過0.8公尺並\n覆蓋盤網防止貨盤脫落。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 101, "q": "遠端接駁停機坪之編號為501-525。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 102, "q": "遠端接駁機坪之編號為A1-A9。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 103, "q": "下包廠商無空側駕駛許可時，應有持有空側駕駛許可\n之駕駛引導進出。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 104, "q": "車輛不可圖一時之便停放於空橋下方之紅線區。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 105, "q": "車輛裝備不得穿越機翼或機腹下方。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 106, "q": "進入空側不論是在操作區或活動區，車輛應備有閃光\n警示燈及桃園機場平面圖。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 107, "q": "航空公司駕駛員在停機坪上檢查飛機時，不須穿著反\n光背心。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 108, "q": "只有執行接機之運務人員，才需在機坪上穿著反光背\n心。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 109, "q": "航空公司接機之運務人員，在機坪上可不穿反光背", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 110, "q": "天氣不佳時車輛在交通道行駛，才需將車頂之閃光警\n示燈開亮，並使用車燈。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 111, "q": "場內駕駛許可持證人離職，應由持證人所屬單位收回\n該證繳交業務處註銷。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 112, "q": "航空器滑行較慢，車輛可由滑行之航空器前闖越或並\n駕齊驅。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 113, "q": "機場作業車輛於停機坪作業時，若趕時間可以由滑行\n中之航空器前方快速通過。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 114, "q": "車輛通行證的B證，可以穿越跑滑道。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 115, "q": "輪檔是餐車必備的裝備，小型車不需使用。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 116, "q": "停機坪上的地面裝備與車輛須使用輪檔，航空器則不\n需使用。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 117, "q": "機坪地勤作業車輛及機具，為達到警示效果，車頂可\n架設紅色或藍色閃光燈。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 118, "q": "日間能見度清晰，視野良好，在交通道行駛時，只需\n開車頂之閃光警示燈，大燈不必開啟。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 119, "q": "政府機關的公務車輛進入環場道時，車身只要有明顯\n機關名稱標誌即可，不必在車頂架設閃光燈。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 120, "q": "駕駛許可持有人離職時，該證自動失效，無須繳回機\n場公司承辦單位註銷。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 121, "q": "駕駛許可持證人離職時，應由持證人所屬單位自行銷\n毀該證。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 122, "q": "領用臨時車輛通行證之車輛於機場行駛時，不需具備\n閃光燈、輪檔、滅火器、車身標誌。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 123, "q": "拖車行駛時，為考量安全，其所拖掛之貨板車或貨櫃\n內最多僅可載1個人。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 124, "q": "施工車輛駕駛人未具有場內駕駛許可，無人引導不可\n在場內行駛。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 125, "q": "航空器停妥關車並安置稐檔後，須待耳機員哨音或手\n勢， 或停機引導員指示，靠機裝備需等安全錐擺放完\n成始可接近該航空器作業。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 126, "q": "拖車行駛時，其所拖掛之貨板車或貨櫃內不得載人。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 127, "q": "拖車行駛時，其所拖掛之貨板車或貨櫃內得載人。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 128, "q": "車輛行駛於空側，嚴禁闖越航空器前方，必要時，得\n就近於後方穿越。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 129, "q": "地面裝備、貨物、器材、車輛可隨意排列於裝備區或\n指定之停放區內，無需注意保持該區之清潔。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 130, "q": "借臨時車輛通行證之車輛於機場內行駛時，只須具備\n閃光燈、輪檔、滅火器、車身標誌，不須強制汽車責\n任保險。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 131, "q": "場內駕駛許可持有人離職時，應由持證人所屬單位收\n回該證繳交航桃園機場公司航務處註銷。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 132, "q": "場內駕駛許可持有人離職時，應由航警局所屬單位收\n回該證繳交航桃園機場公司航務處註銷。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 133, "q": "在本機場活動區內操作車輛或地面裝備，應取得航務\n處核發之「桃園國際機場空側駕駛許可」。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 134, "q": "跑道入侵係指在機場內，航空器、車輛或人員異常出\n現在航空器起降保護區平面上。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 135, "q": "無論白天或夜間在交通道行駛車輛時，應將車頂之閃\n光警示燈開啟，車燈使用近光燈。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 136, "q": "在活動區行駛之車輛應全天開啟大燈及車頂閃光警示\n燈。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 137, "q": "機坪作業車輛機具，車身應有明顯單位名稱標誌，為\n加強安全，車頂可架設紅色閃光燈。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 138, "q": "航空警察局巡邏在停機坪執行警戒任務時，要穿著反\n光背心。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 139, "q": "車輛行駛於劃定之交通道，穿越航機滑行路線(如E、\nW1、W2、Q滑行道)，應於停等標線標誌前確實停等\n，觀察航空器動態後，才可通行。航空器擁有絕對優\n先權，嚴禁強行穿越。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 140, "q": "場內各式車輛駕駛許可若經毀損不易辨識，可直接作\n廢，並可免費換領新證。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 141, "q": "車輛禁止由滑行之航空器前強行闖越或並列駕駛。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 142, "q": "申請操作各式空側作業車輛駕駛許可者，需持單位\n「桃園國際機場靠機裝備完訓紀錄表」至航務處值班\n教官簽名認證。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 143, "q": "車道管制員於滑行進停機位之航機機尾通過交通道時\n結束車道管制。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 144, "q": "航機拖車將航機拖行進入停機位時，車道管制員於航\n機機尾通過交通道時結束車道管制。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 145, "q": "北交通道車輛穿越E滑行道之通行標準：北側拖機只要\n尚未轉向E滑行道方向前，車輛可通行。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 146, "q": "北交通道車輛穿越E滑行道之通行標準：E滑行道上往\n北的拖機未抵達EH1，車輛可通行。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 147, "q": "北交通道車輛穿越E滑行道之通行標準：E滑行道上往\n北的拖機停等於EH1前，未開啟雙黃燈，車輛不可通\n行。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 148, "q": "航機使用A-VDGS進坪導引作業時，航機前方交通道車輛可以通行。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 149, "q": "航機前方交通道擺放三角錐時，車輛仍可通行。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 150, "q": "C15後方外交通道轉彎處延伸至C18繪設雙白實線區\n隔機坪區及滑行道，地面作業裝備與人員不可進入滑\n行道地帶。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 151, "q": "C11~C18交通道及雙白實線以南為滑行道地帶，未經\n塔台許可，人員及車輛可以進入。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 152, "q": "A1-A8、B1-B8空橋橋下所有車輛皆可穿越通行。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 153, "q": "C9/C10間內交通道往外交通道為單向通行，僅可由外\n交通道往內交通道行駛。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 154, "q": "於A/D機坪之外交通道行駛時，若發現自身車輛零件/\n裝備/貨物掉落於交通道旁的滑行道上，且當下無航機\n進出該停機位，是否應立即撿拾？", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 155, "q": "於A/D機坪之外交通道行駛時，若發現自身車輛零件/\n裝備/貨物掉落於交通道旁的機坪內，且當下無航機進\n出該停機位，是否應立即撿拾？", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 156, "q": "停機位裝備區末端之白斜線區是否能停放裝有貨物之貨盤？", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 157, "q": "停機位裝備區末端之白斜線區是否能停放空貨盤？", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 158, "q": "駕駛於北交通道欲從A1側穿越E滑行道至消防北站側\n時，若看見航機於N上往N與P10交口方向滑行(未轉\n正E)，是否可穿越E滑行道？", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 159, "q": "駕駛於北交通道欲從A1側穿越E滑行道至消防北站側\n時，若看見航機於E上往P方向滑行，但尚未通過\nEH1(航郵中心建物南側)，是否可穿越E滑行道？", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 160, "q": "駕駛車輛於外交通道時，若已通過尚未開始管制之車\n道管制員(航機即將後推)，而前方(對向)車道管制員此\n時開始管制(舉手)，是否可繼續通過該停機位後方？", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 161, "q": "駕駛車輛於內交通道欲進入停機坪時，若該停機位之\n航機為靜止，且航機周圍無擺放安全錐(當日無風大情\n況)，非該航班作業車輛是否可進入該停機位？", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 162, "q": "駕駛車輛於內交通道欲進入停機坪時，若該停機位之\n航機正在後推，則應於機翼間距淨空線(紅線)外等待\n至航機機翼脫離停機坪，始得進入該停機位。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 163, "q": "駕駛車輛於內交通道欲進入停機坪時，若該停機位之\n航機正在滑行進入停機坪，則應等待航機鼻輪於停止線上完全停止時使得進入該停機位，並無須觀察外交\n通道之車道管制員手勢。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 164, "q": "Z區停機坪之交通道位於航機機首側。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 165, "q": "Z區停機坪之交通道位於航機機尾側。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 166, "q": "Z區停機坪交通道速限為40公里/時。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 167, "q": "Z區停機坪交通道速限為25公里/時。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 168, "q": "持有D類空側駕駛資格者是否可通行Z區停機坪交通\n道？", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 169, "q": "持有Ｂ類空側駕駛資格者是否可通行Z區停機坪交通\n道？", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 170, "q": "車輛通行證為D類證之車輛是否可通行Z區停機坪交通\n道？", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 171, "q": "車輛通行證為B類證之車輛是否可通行Z區停機坪交通\n道？", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 172, "q": "第三航廈北登機廊廳之交通道為內交通道，限速25公\n里/時。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 173, "q": "第三航廈北登機廊廳之交通道為外交通道，限速25公\n里/時。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 174, "q": "第三航廈北登機廊廳之交通道為內交通道，限速40公\n里/時。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 175, "q": "第三航廈北登機廊廳之交通道為外交通道，限速40公\n里/時。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 176, "q": "駕駛車輛於第三航廈北登機廊廳內交通道時，若前方\n停機位有航機正在使用A-VDGS(先進目視停靠導引系統)滑行進入停機位，應停等並待航機定位後使得繼續\n通行。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 177, "q": "航機拖車將航機拖行進入第三航廈北登機廊廳(D11-\nD18)停機位時，無須車道管制員進行交通管制。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 178, "q": "依據桃園國際機場公司114年2月11日安全委員會航務\n分組統計，「未確實注意周遭動態」為桃園機場空側\n發生車輛/裝備碰撞最常見的發生原因。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 179, "q": "在停機坪裝備區作業無須注意行經裝備區之車輛動\n態。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 180, "q": "車輛、裝備進出機坪時限速15公里/時。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 181, "q": "經機坪外交通道時，須與前車保持安全距離，並注意\n前方是否有前車停等航機進坪/後推交管。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 182, "q": "跨越滑行道時，須與前車保持安全距離，並注意前方\n是否有前車於停等線前等待航機通行。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 183, "q": "車道管制員開始交通管制時可以依照標線進出停機坪", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 184, "q": "到場航機或拖機已進入機坪，車輛就可以依照標線進\n出停機坪。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 185, "q": "「斜坡車道」為連結航廈地下行李處理場之勤務道路\n，禁止停放車輛及裝備。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 186, "q": "駕駛車輛/裝備前應檢查車輛/裝備狀況，避免零件掉\n落，因掉落零件可能變成航機滑行或拖行動線上之\nFOD(外來異物)，致航機輪胎受損。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 187, "q": "倒車應注意四周車輛動態，並注意車輛與四周物體之\n間距，避免碰撞。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 188, "q": "空側違規事件處罰依據桃園國際機場空側違規事件處\n理原則規定辦理。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 189, "q": "無空側駕駛資格人經有空側駕駛資格人陪同或引導下\n(以下稱陪同人)駕駛車輛，如有違規行為，處罰其陪\n同人。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 190, "q": "無空側駕駛資格之行為人受空側駕駛資格停權之處罰\n時，以吊扣機場通行證代之。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 191, "q": "依據桃園國際機場空側違規事件處理原則違規記點表\n，超速(超過最高速限11公里以上40公里以下) 屬於高\n度風險，記點9點，並需於7日內提出改善報告。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 192, "q": "依據桃園國際機場空側違規事件處理原則違規記點表\n，闖越操作區執勤車輛屬於高度風險，記點9點，並需\n於7日內提出改善報告。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 193, "q": "駕駛人之駕駛資格因違規行為註銷後，自註銷日起起\n算12個月後才可重新申請？", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 194, "q": "因無照使違規吊扣通行工作證者，於吊扣期間不得領\n用臨時工作證。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 195, "q": "車輛、裝備進出機坪時限速25公里/時。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 196, "q": "於本機場空側範圍內，可於吸菸區與無人之戶外開放\n空間吸菸。", "options": ["X", "O", "", ""], "answer": 0, "image": null}, {"id": 197, "q": "在跑道內造成FOD會使空側駕駛資\n格停權30天且須於7日內提出改善報告。", "options": ["O", "X", "", ""], "answer": 0, "image": null}, {"id": 1, "q": "有關裝備區白斜線格之敘述下列何者為 非？", "options": ["停車格標示\n「交管車輛專用」字樣，空盤車可以停放", "裝備區白斜線格限空盤車停放", "停車格標示\n「交管車輛專用」字樣，僅供交管車輛於進行車道管制\n時停放", "設置目的為降低交管人員車輛停放造成視線遮蔽風險"], "answer": 0, "image": "images/q1_image12.jpg"}, {"id": 2, "q": "有關第二航廈 D5R候機室前旅客登車通道及抵達通道敘述何者有誤？", "options": ["裝備、車輛可以停放在該區任何空位處", "紅色標線為\n「D5R旅客接駁區」", "「D5R旅客接駁區」除緊急應變、演習或專案許可外，禁止任何裝備車輛進出及停放", "此處主要為旅客接駁車輛使用"], "answer": 0, "image": "images/q2_image3.jpg"}, {"id": 3, "q": "依據此圖航機拖車位置，車輛是否能通行穿越E滑行道？", "options": ["可通行", "不可通行", "", ""], "answer": 0, "image": "images/q3_image18.png"}, {"id": 4, "q": "依據此圖航機拖車位置，車輛是否能通行穿越E滑行道？", "options": ["不可通行", "可通行", "", ""], "answer": 0, "image": "images/q4_image21.jpg"}, {"id": 5, "q": "有關此圖標誌之敘述何者有正確？", "options": ["設置在交通道穿越滑行道停等線前", "停車再開，不\n需要確認滑行道上航機、拖機、值勤車輛\n動態", "穿越前方滑行道前需要另外獲得塔台許可", ""], "answer": 0, "image": "images/q5_image14.png"}, {"id": 6, "q": "有關此圖標誌之敘述何者有誤？", "options": ["停車再開，確\n認不影響滑行道上航機、拖機、值勤車輛\n即可進入或穿", "設置在交通道或勤務道，接近滑行道或跑道前", "進入前方跑道或滑行道需要另外獲得塔台許可", "前方跑道、滑行道區域須為A類車輛及具有A類駕駛許可才可進入"], "answer": 0, "image": "images/q6_image16.png"}, {"id": 7, "q": "此圖標線表示：", "options": ["停車再開", "減速慢行", "", ""], "answer": 0, "image": "images/q7_image1.png"}, {"id": 8, "q": "此圖標線表示：", "options": ["減速慢行", "停車再開", "", ""], "answer": 0, "image": "images/q8_image8.png"}, {"id": 9, "q": "此圖標線表示：", "options": ["停機坪邊界", "車道邊線", "", ""], "answer": 0, "image": "images/q9_image13.png"}, {"id": 10, "q": "此圖標線表示：", "options": ["選項皆是", "車道邊線的一種，表示該路段有航機通行", "貨機坪內車道標線", ""], "answer": 0, "image": "images/q10_image5.png"}, {"id": 11, "q": "有關此圖標線之敘述何者為非？", "options": ["車輛進出進入\n機翼間距淨空線(紅線)跟行駛一般道路一樣\n，只要依據行車方向行駛即\n可，沒有其他", "紅色標線用來標示航機進出停機坪時應保持淨空之區域", "白色箭頭標線為行車方向", "紅線為機翼間距淨空線"], "answer": 0, "image": "images/q11_image19.png"}, {"id": 12, "q": "此圖標線表示：", "options": ["禁止進入", "保持淨空", "", ""], "answer": 0, "image": "images/q12_image10.jpg"}, {"id": 13, "q": "此圖標線表示：", "options": ["保持淨空", "禁止進入", "", ""], "answer": 0, "image": "images/q13_image9.jpg"}, {"id": 14, "q": "此圖標線表示：", "options": ["保持淨空", "禁止進入", "", ""], "answer": 0, "image": "images/q14_image11.jpg"}, {"id": 15, "q": "此圖標線表示：", "options": ["僅限停放空盤車", "僅線停放交管車輛", "", ""], "answer": 0, "image": "images/q15_image20.jpg"}, {"id": 16, "q": "有關此圖標線之", "options": ["設置在停機坪裝備停放區與外交通道之間", "「交管車輛專\n用」停車格，所有車輛都可\n以停放", "白斜線格所有車輛、裝備都可以停放", "設置目的是為了讓裝備擺放整齊"], "answer": 0, "image": "images/q16_image15.jpg"}, {"id": 17, "q": "有關此圖標線之", "options": ["無接駁車使用期間，其他車輛可以臨時停放", "接駁車專用停車格", "平時應保持淨空", ""], "answ const QUIZ_N=20; let selected=[]; let currentUser=null;
const authCard=document.getElementById('authCard'),topbarLogout=document.getElementById('topbarLogout');
const quizWrap=document.getElementById('quiz'),actionsBar=document.getElementById('actionsBar');
const resultEl=document.getElementById('result');
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function toEmail(u){const v=(u||'').trim().toLowerCase();return !v?'':(v.includes('@')?v:`${v}@taoyuan.local`);}
function shuffle(a){const x=[...a];for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x;}
function setQuizVisible(ok){quizWrap.style.display=ok?'block':'none';actionsBar.style.display=ok?'block':'none';authCard.style.display=ok?'none':'block';topbarLogout.style.display=ok?'flex':'none';}
function pick(){selected=shuffle(BANK).slice(0,QUIZ_N);resultEl.textContent='';render();window.scrollTo({top:0,behavior:'smooth'});}
function render(){quizWrap.innerHTML='';selected.forEach((q,idx)=>{const card=document.createElement('div');card.className='card';const options=q.options.map((op,i)=>op?`<label><input type="radio" name="q${idx}" value="${i}">${esc(op)}</label>`:'').join('');card.innerHTML=`<div class="q">${idx+1}. ${esc(q.q)}</div>${q.image?`<img class="quiz-img" loading="lazy" src="${q.image}" alt="題目圖">`:''}${options}<div id="fb${idx}" class="small" style="margin-top:8px"></div>`;quizWrap.appendChild(card);});}
function getAnswers(){return selected.map((q,idx)=>{const c=document.querySelector(`input[name=q${idx}]:checked`);return c?Number(c.value):null;});}
function gradeOnly(){const ans=getAnswers();let score=0;ans.forEach((a,i)=>{if(a===selected[i].answer)score++;});return {score,total:selected.length,answers:ans};}
async function saveAttempt(r){if(!sbClient||!currentUser)return;await sbClient.from('quiz_attempts').insert({user_id:currentUser.id,user_email:currentUser.email,score:r.score,total:r.total,version:'v33',answers:r.answers});}
async function submitQuiz(){const r=gradeOnly();const firstUnanswered=r.answers.findIndex(a=>a===null);if(firstUnanswered!==-1){resultEl.textContent='尚有未作答題目，請先完成再交卷。';resultEl.style.color='var(--bad)';quizWrap.querySelectorAll('.card')[firstUnanswered]?.scrollIntoView({behavior:'smooth',block:'center'});return;}resultEl.style.color='var(--text-main)';resultEl.textContent=`成績：${r.score} / ${r.total}`;const cards=[...quizWrap.querySelectorAll('.card')];const wrong=[];r.answers.forEach((a,i)=>{const fb=document.getElementById(`fb${i}`);fb.style.marginTop='12px';fb.style.padding='10px 14px';fb.style.borderRadius='8px';fb.style.fontWeight='600';fb.style.fontSize='1rem';if(a===selected[i].answer){fb.textContent='✅ 答對';fb.style.color='var(--ok)';fb.style.background='#d1fae5';}else{const right=selected[i].options[selected[i].answer]||`選項${selected[i].answer+1}`;fb.textContent=`❌ 答錯，正確：${right}`;fb.style.color='var(--bad)';fb.style.background='#ffe4e6';wrong.push(i);}});const ws=new Set(wrong);cards.forEach((c,i)=>{if(ws.has(i)){c.classList.add('wrong');c.style.border='';}else{c.style.border='2px solid #34d399';c.style.background='rgba(255,255,255,0.9)';}});quizWrap.innerHTML='';[...cards.filter((c,i)=>ws.has(i)),...cards.filter((c,i)=>!ws.has(i))].forEach(c=>quizWrap.appendChild(c));window.scrollTo({top:0,behavior:'smooth'});document.querySelectorAll('input[type=radio]').forEach(el=>el.disabled=true);await saveAttempt(r);}
async function refreshUser(){if(!sbClient){setQuizVisible(false);return;}const {data}=await sbClient.auth.getUser();currentUser=data?.user||null;setQuizVisible(!!currentUser);}
async function signIn(){if(!sbClient)return alert('登入服務不可用');const email=toEmail(document.getElementById('username').value);const password=document.getElementById('password').value;const {error}=await sbClient.auth.signInWithPassword({email,password});if(error)return alert('登入失敗：'+error.message);await refreshUser();pick();}
async function signOutApp(){if(!sbClient)return;await sbClient.auth.signOut();setQuizVisible(false);} 
document.getElementById('btnSignIn').addEventListener('click',signIn);
document.getElementById('btnTopSignOut').addEventListener('click',signOutApp);
document.getElementById('submitBtn').addEventListener('click',submitQuiz);
document.getElementById('reloadBtn').addEventListener('click',pick);
(async()=>{await refreshUser();if(currentUser)pick();})();
</script></body></html>
